name: Build and Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:
  repository_dispatch:
    types: [deploy-pages]
  workflow_run:
    workflows: ["Fetch Paper Feeds"]
    types: [completed]

permissions:
  contents: write
  pages: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Install Emacs
        run: sudo apt-get update && sudo apt-get install -y emacs-nox

      - name: Build site
        run: python3 build.py

      - name: Publish gh-pages branch
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git fetch origin gh-pages || true
          rm -rf /tmp/gh-pages

          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git worktree add /tmp/gh-pages origin/gh-pages
          else
            git worktree add --detach /tmp/gh-pages
            git -C /tmp/gh-pages switch --orphan gh-pages
          fi

          find /tmp/gh-pages -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a _site/. /tmp/gh-pages/

          cd /tmp/gh-pages
          git add -A
          if git diff --cached --quiet; then
            echo "No site changes to deploy"
          else
            git commit -m "Deploy site"
            git push origin HEAD:gh-pages
          fi
